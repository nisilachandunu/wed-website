<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f7f2e9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Wedding Invitation — Nisila & Yashmi</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50,88 C25,65 5,50 5,30 C5,15 15,5 30,5 C40,5 48,12 50,20 C52,12 60,5 70,5 C85,5 95,15 95,30 C95,50 75,65 50,88Z' fill='%23c9a96e'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Montserrat:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --gold: #c9a96e;
        --ivory: #fffdf7;
        --text: #4a3728;
        --card-ratio: 2114 / 3000;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cormorant Garamond", serif;
        color: var(--text);
        background:
          radial-gradient(
            ellipse at 15% 10%,
            rgba(232, 213, 176, 0.5) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 90% 85%,
            rgba(212, 165, 165, 0.28) 0%,
            transparent 55%
          ),
          #f7f2e9;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 1.5rem;
        overflow-x: hidden;
      }

      /* --- Intro Preloader (rings drawing, as on the main site) --- */
      .preloader {
        position: fixed;
        inset: 0;
        z-index: 20000;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            ellipse at 50% 40%,
            rgba(201, 169, 110, 0.12) 0%,
            transparent 60%
          ),
          var(--ivory);
        transition:
          opacity 0.9s ease,
          visibility 0.9s ease;
      }

      .preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preloader-inner {
        text-align: center;
      }

      .preloader-rings {
        width: 130px;
        height: 78px;
        margin-bottom: 1rem;
      }

      .preloader-rings .ring {
        fill: none;
        stroke: var(--gold);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 170;
        stroke-dashoffset: 170;
        animation: drawRing 1.6s ease forwards;
        filter: drop-shadow(0 0 6px rgba(201, 169, 110, 0.5));
      }

      .preloader-rings .ring-2 {
        stroke: #b08968;
        animation-delay: 0.35s;
      }

      @keyframes drawRing {
        to {
          stroke-dashoffset: 0;
        }
      }

      .preloader-names {
        font-family: "Great Vibes", cursive;
        font-size: 2.4rem;
        color: #7f5539;
        opacity: 0;
        animation: preloaderFadeUp 1s ease 0.9s forwards;
      }

      .preloader-date {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 6px;
        color: #7f5539;
        text-shadow: 0 0 12px rgba(201, 169, 110, 0.55);
        margin-top: 0.6rem;
        opacity: 0;
        animation:
          preloaderFadeUp 1s ease 1.25s forwards,
          preloaderDateGlow 2.4s ease-in-out 2.25s infinite;
      }

      @keyframes preloaderDateGlow {
        0%,
        100% {
          text-shadow: 0 0 12px rgba(201, 169, 110, 0.55);
        }
        50% {
          text-shadow:
            0 0 18px rgba(201, 169, 110, 0.9),
            0 0 30px rgba(201, 169, 110, 0.4);
        }
      }

      @keyframes preloaderFadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Soft drifting light behind everything */
      .aurora {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .aurora span {
        position: absolute;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.45;
      }

      .aurora span:nth-child(1) {
        width: 60vw;
        height: 60vw;
        left: -20%;
        top: -10%;
        background: radial-gradient(
          circle,
          rgba(212, 163, 115, 0.4) 0%,
          transparent 65%
        );
        animation: drift1 26s ease-in-out infinite alternate;
      }

      .aurora span:nth-child(2) {
        width: 50vw;
        height: 50vw;
        right: -15%;
        bottom: -10%;
        background: radial-gradient(
          circle,
          rgba(212, 165, 165, 0.35) 0%,
          transparent 65%
        );
        animation: drift2 30s ease-in-out infinite alternate;
      }

      @keyframes drift1 {
        to {
          transform: translate(10vw, 8vh) scale(1.15);
        }
      }

      @keyframes drift2 {
        to {
          transform: translate(-8vw, -8vh) scale(0.9);
        }
      }

      .page-header {
        position: relative;
        z-index: 1;
        text-align: center;
        margin-bottom: 1.2rem;
        opacity: 0;
      }

      body.intro-done .page-header {
        animation: fadeInUp 0.9s ease 0.1s forwards;
      }

      .page-header .ornament {
        display: block;
        color: var(--gold);
        font-size: 1.3rem;
        margin-bottom: 0.3rem;
        animation: sparkle 2.5s ease-in-out infinite;
      }

      @keyframes sparkle {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      .page-header h1 {
        font-family: "Great Vibes", cursive;
        font-size: 2.6rem;
        font-weight: 400;
        background: linear-gradient(
          110deg,
          #7f5539 30%,
          var(--gold) 50%,
          #7f5539 70%
        );
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 6s ease-in-out infinite;
      }

      @keyframes shimmer {
        0% {
          background-position: 120% 0;
        }
        50% {
          background-position: -60% 0;
        }
        100% {
          background-position: -60% 0;
        }
      }

      .page-header p {
        font-style: italic;
        font-size: 1rem;
        color: #7c6a5a;
        letter-spacing: 2px;
        margin-top: 0.1rem;
      }

      .action-bar {
        position: relative;
        z-index: 1;
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        justify-content: center;
        opacity: 0;
      }

      body.intro-done .action-bar {
        animation: fadeInUp 0.9s ease 0.35s forwards;
      }

      .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 2rem;
        border: 1.5px solid var(--gold);
        border-radius: 50px;
        background: var(--ivory);
        color: var(--text);
        font-family: "Montserrat", sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .action-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -80%;
        width: 45%;
        height: 100%;
        background: linear-gradient(
          100deg,
          transparent,
          rgba(255, 255, 255, 0.55),
          transparent
        );
        transform: skewX(-20deg);
        animation: sheen 5s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes sheen {
        0%,
        65% {
          left: -80%;
        }
        100% {
          left: 160%;
        }
      }

      .action-btn:hover {
        background: linear-gradient(135deg, var(--gold), #b08968);
        border-color: transparent;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(201, 169, 110, 0.4);
      }

      .invitation-viewer {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 560px;
        aspect-ratio: var(--card-ratio);
        background: white;
        border-radius: 4px;
        box-shadow:
          0 12px 40px rgba(61, 44, 44, 0.18),
          0 0 0 1px rgba(201, 169, 110, 0.25),
          0 0 60px rgba(201, 169, 110, 0.15);
        overflow: hidden;
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }

      body.intro-done .invitation-viewer {
        animation: cardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .invitation-card {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background-image: url("assets/invitation-card.jpg");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Guest name overlay — covers the whole printed "MR / MRS / MISS ....." line */
      .guest-name-mask {
        position: absolute;
        left: 15.5%;
        top: 11.9%;
        width: 69%;
        height: 3.1%;
        /* Matches the card's watercolor wash: greener on the left, lighter on the right */
        background: linear-gradient(
          to right,
          #d5d9cc 0%,
          #d9ddd2 30%,
          #e4e5df 55%,
          #e6e7e1 100%
        );
        /* Fade the patch edges into the watercolor wash; the fade zones sit
           over plain background, clear of the printed text */
        -webkit-mask-image:
          linear-gradient(to right, transparent, #000 3%, #000 97%, transparent),
          linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
        -webkit-mask-composite: destination-in;
        mask-image:
          linear-gradient(to right, transparent, #000 3%, #000 97%, transparent),
          linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
        mask-composite: intersect;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .guest-name {
        position: absolute;
        left: 17.5%;
        top: 12.15%;
        width: 65%;
        height: 2.6%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
      }

      .guest-name span {
        color: #434c1f;
        font-family: "Cormorant Garamond", serif;
        font-weight: 700;
        letter-spacing: 0.06em;
        white-space: nowrap;
        line-height: 1;
        opacity: 0;
      }

      body.intro-done .guest-name span {
        animation: nameIn 1.2s ease 1.5s forwards;
      }

      @keyframes nameIn {
        from {
          opacity: 0;
          letter-spacing: 0.2em;
        }
        to {
          opacity: 1;
          letter-spacing: 0.06em;
        }
      }

      .guest-name-mask,
      .guest-name {
        display: none;
      }

      .invitation-viewer.has-guest .guest-name-mask {
        display: block;
      }

      .invitation-viewer.has-guest .guest-name {
        display: flex;
      }

      .invitation-fallback {
        padding: 2rem;
        text-align: center;
        color: var(--text);
      }

      .invitation-fallback p {
        margin-bottom: 1rem;
        font-size: 1.1rem;
      }

      .rsvp-note {
        position: relative;
        z-index: 1;
        margin-top: 1.4rem;
        text-align: center;
        font-size: 1.2rem;
        font-style: italic;
        color: #7c6a5a;
        letter-spacing: 0.5px;
        opacity: 0;
      }

      .rsvp-note strong {
        color: #7f5539;
        font-weight: 700;
        font-style: normal;
      }

      body.intro-done .rsvp-note {
        animation: fadeInUp 0.9s ease 1s forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .aurora,
        .preloader {
          display: none;
        }

        .page-header,
        .action-bar,
        .invitation-viewer,
        .rsvp-note,
        .guest-name span,
        body.intro-done .page-header,
        body.intro-done .action-bar,
        body.intro-done .invitation-viewer,
        body.intro-done .rsvp-note,
        body.intro-done .guest-name span {
          opacity: 1;
          transform: none;
          animation: none;
        }

        .page-header .ornament,
        .page-header h1,
        .action-btn::after {
          animation: none;
        }

        .page-header h1 {
          background: none;
          -webkit-text-fill-color: #7f5539;
        }
      }

    </style>
  </head>
  <body>
    <!-- Intro Preloader -->
    <div class="preloader" id="preloader">
      <div class="preloader-inner">
        <svg
          class="preloader-rings"
          viewBox="0 0 130 78"
          fill="none"
          aria-hidden="true"
        >
          <circle class="ring ring-1" cx="48" cy="39" r="27" />
          <circle class="ring ring-2" cx="82" cy="39" r="27" />
        </svg>
        <p class="preloader-names">Nisila &amp; Yashmi</p>
        <p class="preloader-date">20 . 08 . 2026</p>
      </div>
    </div>

    <div class="aurora" aria-hidden="true"><span></span><span></span></div>

    <header class="page-header">
      <span class="ornament">✦</span>
      <h1>Nisila &amp; Yashmi</h1>
      <p>joyfully invite you to celebrate</p>
    </header>

    <div class="action-bar">
      <a href="index.html" class="action-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Website
      </a>
      <a href="invitation.pdf" download class="action-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
        Download
      </a>
    </div>

    <div class="invitation-viewer" id="invitationViewer">
      <div class="invitation-card"></div>
      <div class="guest-name-mask"></div>
      <div class="guest-name" id="guestName">
        <span id="guestNameText"></span>
      </div>
      <noscript>
        <div class="invitation-fallback">
          <p>
            Your browser needs JavaScript enabled to view the invitation inline.
          </p>
          <a href="invitation.pdf" class="action-btn" download
            >Download Invitation</a
          >
        </div>
      </noscript>
    </div>

    <p class="rsvp-note">
      Your presence means a lot. Kindly RSVP on or before
      <strong>6th August 2026</strong>. You can RSVP through the website as well —
      just tap <strong>"Back to Website"</strong> above.
    </p>

    <script>
      (function () {
        // Intro preloader: let the rings draw before revealing the invitation
        const preloader = document.getElementById("preloader");
        const reducedMotion = window.matchMedia(
          "(prefers-reduced-motion: reduce)"
        ).matches;

        if (reducedMotion) {
          if (preloader) preloader.remove();
          document.body.classList.add("intro-done");
        } else {
          setTimeout(() => {
            if (preloader) preloader.classList.add("hidden");
            document.body.classList.add("intro-done");
          }, 2400);
        }

        const STORAGE_KEY = "weddingGuestName";
        const params = new URLSearchParams(window.location.search);
        let guest = (params.get("to") || "").trim();

        // Remember the invited guest so the name survives navigating
        // away and returning without the ?to= link
        try {
          if (guest) {
            localStorage.setItem(STORAGE_KEY, guest);
          } else {
            guest = (localStorage.getItem(STORAGE_KEY) || "").trim();
          }
        } catch (e) {
          /* storage unavailable (private mode) — fall back to URL only */
        }

        // "kasun perera" / "KASUN PERERA" -> "Kasun Perera".
        // Strip invisible characters that sneak in from copied links,
        // then capitalize every run of letters so the first word is
        // handled the same as the rest
        guest = guest
          .replace(/[\u200B-\u200D\uFEFF]/g, "")
          .trim()
          .toLowerCase()
          .replace(/\p{L}+/gu, (w) => w.charAt(0).toUpperCase() + w.slice(1));

        if (guest) {
          const viewer = document.getElementById("invitationViewer");
          const nameEl = document.getElementById("guestName");
          const textEl = document.getElementById("guestNameText");

          textEl.textContent = guest;
          viewer.classList.add("has-guest");

          // Auto-shrink long names so they stay on one line within the placeholder
          const maxWidth = nameEl.clientWidth;
          let fontSize = 25;
          textEl.style.fontSize = fontSize + "px";
          while (textEl.scrollWidth > maxWidth && fontSize > 6) {
            fontSize -= 1;
            textEl.style.fontSize = fontSize + "px";
          }

          document.title = `You're Invited, ${guest} — Nisila & Yashmi`;

          const headerSub = document.querySelector(".page-header p");
          if (headerSub) {
            headerSub.textContent = `especially for you, ${guest}`;
          }

          personalizeDownload(guest);
        }

        // Replace the static PDF download with a personalized image of the
        // card that has the guest's name rendered on it
        function personalizeDownload(name) {
          const downloadBtn = document.querySelector('a[href="invitation.pdf"][download]');
          if (!downloadBtn) return;

          downloadBtn.addEventListener("click", async (e) => {
            e.preventDefault();
            try {
              const canvas = await renderPersonalizedCard(name);
              const blob = await new Promise((resolve) =>
                canvas.toBlob(resolve, "image/jpeg", 0.92)
              );
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = `Wedding-Invitation-${name.replace(/\s+/g, "-")}.jpg`;
              a.click();
              setTimeout(() => URL.revokeObjectURL(url), 5000);
            } catch (err) {
              // Canvas failed (very old browser) — fall back to the plain PDF
              window.location.href = downloadBtn.href;
            }
          });
        }

        async function renderPersonalizedCard(name) {
          await document.fonts.load('700 100px "Cormorant Garamond"');

          const img = new Image();
          img.src = "assets/invitation-card.jpg";
          await img.decode();

          const W = img.naturalWidth;
          const H = img.naturalHeight;
          const canvas = document.createElement("canvas");
          canvas.width = W;
          canvas.height = H;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);

          // Cover the printed "MR / MRS / MISS ....." line — same geometry,
          // colors, and soft edge fades as the on-screen .guest-name-mask
          const mw = W * 0.69;
          const mh = H * 0.031;
          const patch = document.createElement("canvas");
          patch.width = Math.ceil(mw);
          patch.height = Math.ceil(mh);
          const p = patch.getContext("2d");

          const wash = p.createLinearGradient(0, 0, mw, 0);
          wash.addColorStop(0, "#d5d9cc");
          wash.addColorStop(0.3, "#d9ddd2");
          wash.addColorStop(0.55, "#e4e5df");
          wash.addColorStop(1, "#e6e7e1");
          p.fillStyle = wash;
          p.fillRect(0, 0, mw, mh);

          p.globalCompositeOperation = "destination-in";
          const hFade = p.createLinearGradient(0, 0, mw, 0);
          hFade.addColorStop(0, "rgba(0,0,0,0)");
          hFade.addColorStop(0.03, "#000");
          hFade.addColorStop(0.97, "#000");
          hFade.addColorStop(1, "rgba(0,0,0,0)");
          p.fillStyle = hFade;
          p.fillRect(0, 0, mw, mh);

          const vFade = p.createLinearGradient(0, 0, 0, mh);
          vFade.addColorStop(0, "rgba(0,0,0,0)");
          vFade.addColorStop(0.18, "#000");
          vFade.addColorStop(0.82, "#000");
          vFade.addColorStop(1, "rgba(0,0,0,0)");
          p.fillStyle = vFade;
          p.fillRect(0, 0, mw, mh);

          ctx.drawImage(patch, W * 0.155, H * 0.119);

          // Guest name, centered on the line — same box as .guest-name
          const nw = W * 0.65;
          const nh = H * 0.026;
          let fontSize = Math.round(nh * 1.0);
          ctx.fillStyle = "#434c1f";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          do {
            ctx.font = `700 ${fontSize}px "Cormorant Garamond", serif`;
            if ("letterSpacing" in ctx) {
              ctx.letterSpacing = fontSize * 0.06 + "px";
            }
            if (ctx.measureText(name).width <= nw) break;
            fontSize -= 2;
          } while (fontSize > 20);

          ctx.fillText(name, W * 0.175 + nw / 2, H * 0.1215 + nh / 2);
          return canvas;
        }
      })();
    </script>
  </body>
</html>
